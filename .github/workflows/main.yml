---
name: CI

# NOTE(romcheg): Controls when the action will run. Triggers the workflow on
#                push or pull request events but only for the ng branch
on:
  push:
  pull_request:
    branches: [ ng ]

jobs:
  code_style:
    name: Code style
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v2

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libldap2-dev libsasl2-dev libssl-dev
        env:
          DEBIAN_FRONDEND: NONINTERACTIVE

      - name: Install and configure Mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo 'eval "$(mise activate bash)"' >> ~/.bashrc
          bash -c "source ~/.bashrc"

      - name: Mise install tools
        run: |
          mise install

      - name: Check formatting
        run: mise run checks

  missing_migrations:
    name: Missing migrations
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        db-engine: ["ci-psql", "ci-mysql"]
    env:
        MISE_ENV: ${{ matrix.db-engine }}
    services:
      postgres:
        image: postgres:9.4.26
        env:
          POSTGRES_USER: ralph_ng
          POSTGRES_PASSWORD: ralph_ng
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # NOTE(romcheg): Running mysql image of a more recent version will cause user
      #                ralph_ng to not being able to create a test database.
      mysql:
        image: mysql:5.6.45
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: ralph_ng
          MYSQL_PASSWORD: ralph_ng
          MYSQL_DATABASE: ralph_ng
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2

      - name: Unshallow local copy
        run: git fetch --prune --unshallow

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libldap2-dev libsasl2-dev libssl-dev
        env:
          DEBIAN_FRONDEND: NONINTERACTIVE

      - name: Install and configure Mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo 'eval "$(mise activate bash)"' >> ~/.bashrc
          bash -c "source ~/.bashrc"

      - name: Mise install tools
        run: |
          mise install

      # Runs a set of commands using the runners shell
      - name: Check missing migrations
        run: "mise run check-missing-migrations"

  settings_test:
    name: Settings tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2

      - name: Unshallow local copy
        run: git fetch --prune --unshallow

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libldap2-dev libsasl2-dev libssl-dev
        env:
          DEBIAN_FRONDEND: NONINTERACTIVE

      - name: Install and configure Mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo 'eval "$(mise activate bash)"' >> ~/.bashrc
          bash -c "source ~/.bashrc"

      - name: Mise install tools
        run: |
          mise install

      - name: Test Ralph's settings
        run:  ./scripts/test_settings.sh prod test >/dev/null

  python_tests:
    name: Python tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [3.8.18]
        db-engine: ["ci-psql", "ci-mysql"]
    env:
      MISE_ENV: ${{ matrix.db-engine }}
      DATABASE_USER: ralph_ng
      DATABASE_PASSWORD: ralph_ng

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s

      postgres:
        image: postgres:9.4.26
        env:
          POSTGRES_USER: ralph_ng
          POSTGRES_PASSWORD: ralph_ng
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # NOTE(romcheg): See the note regarging the mysql service above.
      mysql:
        image: mysql:5.6.45
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: ralph_ng
          MYSQL_PASSWORD: ralph_ng
          MYSQL_DATABASE: ralph_ng
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout source code
        uses: actions/checkout@v2

      - name: Unshallow local copy
        run: git fetch --prune --unshallow

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get -y --no-install-recommends install libldap2-dev libsasl2-dev libssl-dev
        env:
          DEBIAN_FRONDEND: NONINTERACTIVE

      - name: Install and configure Mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo 'eval "$(mise activate bash)"' >> ~/.bashrc
          bash -c "source ~/.bashrc"

      - name: Mise install tools
        run: |
          mise install

      - name: Test ralph_dchp_agent
        run: uv run contrib/dhcp_agent/test.py

      - name: Test Ralph with coverage using python-${{ matrix.python-version }}
        run: mise run tests
...
